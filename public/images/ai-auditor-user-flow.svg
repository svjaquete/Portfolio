<svg viewBox="0 0 1140 180" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" fill="#555"/>
    </marker>
  </defs>

  <!-- START -->
  <rect x="8" y="72" width="64" height="32" rx="16" fill="none" stroke="#00d2c8" stroke-width="1.5"/>
  <text x="40" y="93" text-anchor="middle" fill="#00d2c8" font-size="12" font-weight="600" letter-spacing="0.03em">START</text>
  <line x1="72" y1="88" x2="94" y2="88" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 1. Dashboard -->
  <rect x="96" y="60" width="108" height="56" rx="8" fill="none" stroke="#444" stroke-width="1.5"/>
  <text x="150" y="84" text-anchor="middle" fill="#ddd" font-size="12" font-weight="600">1. Dashboard</text>
  <text x="150" y="102" text-anchor="middle" fill="#777" font-size="11">View stats</text>
  <line x1="204" y1="88" x2="226" y2="88" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 2. Upload -->
  <rect x="228" y="60" width="108" height="56" rx="8" fill="none" stroke="#444" stroke-width="1.5"/>
  <text x="282" y="84" text-anchor="middle" fill="#ddd" font-size="12" font-weight="600">2. Upload</text>
  <text x="282" y="102" text-anchor="middle" fill="#777" font-size="11">Drop files</text>
  <line x1="336" y1="88" x2="358" y2="88" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- AI Process -->
  <rect x="360" y="60" width="118" height="56" rx="8" fill="#150d2e" stroke="#7c6af7" stroke-width="1.5"/>
  <text x="419" y="81" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">🤖 AI Process</text>
  <text x="419" y="98" text-anchor="middle" fill="#a89ff7" font-size="10">Generate answers</text>
  <line x1="478" y1="88" x2="500" y2="88" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 3. Review -->
  <rect x="502" y="60" width="108" height="56" rx="8" fill="none" stroke="#444" stroke-width="1.5"/>
  <text x="556" y="84" text-anchor="middle" fill="#ddd" font-size="12" font-weight="600">3. Review</text>
  <text x="556" y="102" text-anchor="middle" fill="#777" font-size="11">Questions tab</text>
  <line x1="610" y1="88" x2="626" y2="88" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- For each -->
  <text x="644" y="84" text-anchor="middle" fill="#666" font-size="10">For each</text>
  <text x="644" y="97" text-anchor="middle" fill="#666" font-size="10">(8×)</text>
  <line x1="662" y1="88" x2="678" y2="88" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 4. Check Answer -->
  <rect x="680" y="60" width="116" height="56" rx="8" fill="none" stroke="#444" stroke-width="1.5"/>
  <text x="738" y="84" text-anchor="middle" fill="#ddd" font-size="12" font-weight="600">4. Check Answer</text>
  <text x="738" y="102" text-anchor="middle" fill="#777" font-size="11">Review sources</text>
  <line x1="796" y1="88" x2="814" y2="88" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- OK? diamond -->
  <polygon points="836,62 862,88 836,114 810,88" fill="none" stroke="#444" stroke-width="1.5"/>
  <text x="836" y="93" text-anchor="middle" fill="#ddd" font-size="11" font-weight="600">OK?</text>

  <!-- Yes → Approve -->
  <line x1="862" y1="88" x2="880" y2="88" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="871" y="82" text-anchor="middle" fill="#666" font-size="10">Yes</text>
  <rect x="882" y="70" width="80" height="30" rx="6" fill="none" stroke="#7c6af7" stroke-width="1.5"/>
  <text x="922" y="90" text-anchor="middle" fill="#a89ff7" font-size="12" font-weight="600">Approve</text>

  <!-- No → Reject -->
  <line x1="836" y1="114" x2="836" y2="140" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="846" y="132" fill="#666" font-size="10">No</text>
  <line x1="836" y1="140" x2="882" y2="140" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="882" y="126" width="80" height="30" rx="6" fill="none" stroke="#e04060" stroke-width="1.5"/>
  <text x="922" y="146" text-anchor="middle" fill="#e04060" font-size="12" font-weight="600">Reject</text>

  <!-- Approve → More? -->
  <line x1="962" y1="85" x2="986" y2="85" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- More? diamond -->
  <polygon points="1010,60 1038,85 1010,110 982,85" fill="none" stroke="#444" stroke-width="1.5"/>
  <text x="1010" y="90" text-anchor="middle" fill="#ddd" font-size="11" font-weight="600">More?</text>

  <!-- Yes → loop back -->
  <line x1="1010" y1="60" x2="1010" y2="30" stroke="#555" stroke-width="1.5"/>
  <text x="1020" y="50" fill="#666" font-size="10">Yes</text>
  <line x1="1010" y1="30" x2="556" y2="30" stroke="#555" stroke-width="1.5"/>
  <line x1="556" y1="30" x2="556" y2="60" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="780" y="22" text-anchor="middle" fill="#555" font-size="10" letter-spacing="0.05em">LOOP BACK</text>

  <!-- No → end -->
  <line x1="1038" y1="85" x2="1056" y2="85" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="1047" y="79" fill="#666" font-size="10">No</text>
  <rect x="1058" y="69" width="56" height="32" rx="16" fill="none" stroke="#00d2c8" stroke-width="1.5"/>
  <text x="1086" y="90" text-anchor="middle" fill="#00d2c8" font-size="12" font-weight="600" letter-spacing="0.03em">END</text>
</svg>
